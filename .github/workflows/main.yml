name: Daily Stock Reporter
on:
  schedule:
    # 台灣時間 06:30（隔日早上）= UTC 22:30（前一天）
    # 預留 ~2hr buffer 給 GitHub Actions 排程延遲
    # 週一~週五 UTC 22:30 對應週二~週六 TW 06:30
    - cron: '30 22 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run script
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python send_report.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/report.json
          git diff --staged --quiet || git commit -m "Update report data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
