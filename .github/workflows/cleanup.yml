name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Keep latest 1 run per workflow (3 total in All Workflows view)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, json
          from collections import defaultdict

          repo = "${{ github.repository }}"

          result = subprocess.run(
            ['gh', 'run', 'list', '--repo', repo, '--limit', '200',
             '--json', 'databaseId,workflowName'],
            capture_output=True, text=True
          )
          runs = json.loads(result.stdout)

          by_workflow = defaultdict(list)
          for r in runs:
            by_workflow[r['workflowName']].append(r['databaseId'])

          deleted = 0
          for wf, ids in by_workflow.items():
            for run_id in ids[1:]:   # keep only the latest 1 per workflow
              res = subprocess.run(
                ['gh', 'api', '-X', 'DELETE',
                 f'/repos/{repo}/actions/runs/{run_id}'],
                capture_output=True, text=True
              )
              if res.returncode == 0:
                print(f"✓ Deleted {wf} run {run_id}")
                deleted += 1
              else:
                print(f"✗ Failed {wf} run {run_id}: {res.stderr.strip()}")

          print(f"Done: deleted {deleted} runs")
          PYEOF
