name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 1 * * *'  # 每天 UTC 01:00
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Keep latest 3 runs per workflow, delete the rest
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch ALL runs across every workflow (including pages build and deployment)
            const allRuns = [];
            let page = 1;
            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page,
              });
              allRuns.push(...data.workflow_runs);
              if (data.workflow_runs.length < 100) break;
              page++;
            }

            // Group by workflow_id (API returns newest-first already)
            const byWorkflow = {};
            for (const run of allRuns) {
              if (!byWorkflow[run.workflow_id]) byWorkflow[run.workflow_id] = [];
              byWorkflow[run.workflow_id].push(run);
            }

            // Keep latest 3 per group, delete the rest
            for (const [wfId, runs] of Object.entries(byWorkflow)) {
              const toDelete = runs.slice(3);
              for (const run of toDelete) {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
                console.log(`Deleted "${run.name}" run #${run.run_number}`);
              }
            }
