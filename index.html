<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏦 盤後籌碼報告</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8fafc;
      --surface2: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .header-top h1 { font-size: 1.05rem; font-weight: 700; }
    .updated { font-size: 0.75rem; color: var(--muted); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 0;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 8px 8px 0 0;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--muted);
      border: 1px solid transparent;
      border-bottom: none;
      background: transparent;
      transition: color 0.15s, background 0.15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--blue);
      background: var(--bg);
      border-color: var(--border);
    }

    /* ── Content ── */
    .page { display: none; padding: 16px; max-width: 720px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── Cards ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }
    .card.full { grid-column: 1 / -1; }
    .card-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .as-of {
      text-transform: none;
      letter-spacing: normal;
      font-size: 0.7rem;
      opacity: 0.8;
    }
    .card-value { font-size: 1.45rem; font-weight: 700; line-height: 1.2; }
    .card-diff  { font-size: 0.82rem; margin-top: 5px; color: var(--muted); }
    .up      { color: var(--green); }
    .down    { color: var(--red); }
    .neutral { color: var(--muted); }

    .box {
      background: var(--surface2);
      border-radius: 10px;
      padding: 13px 15px;
      font-size: 0.92rem;
      line-height: 1.65;
      margin-top: 4px;
    }
    .box p { margin-bottom: 5px; }
    .box p:last-child { margin-bottom: 0; }

    .vol-bar-wrap {
      margin-top: 10px;
      background: var(--surface2);
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }
    .vol-bar { height: 100%; border-radius: 6px; background: var(--blue); }
    .vol-bar.hot { background: var(--red); }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.74rem;
      font-weight: 600;
      margin-top: 5px;
    }
    .bg-green  { background: rgba(16,185,129,.15); color: var(--green); }
    .bg-red    { background: rgba(239,68,68,.15);  color: var(--red); }
    .bg-yellow { background: rgba(245,158,11,.15); color: var(--yellow); }
    .bg-blue   { background: rgba(59,130,246,.15); color: var(--blue); }

    /* ── Error card ── */
    .err-card {
      grid-column: 1 / -1;
      background: rgba(239,68,68,.08);
      border: 1px solid var(--red);
      border-radius: 12px;
      padding: 18px;
      color: var(--red);
      text-align: center;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    /* ── Manage tab ── */
    .manage-section { margin-bottom: 24px; }
    .manage-section h2 {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }
    .stock-list { display: flex; flex-direction: column; gap: 8px; }
    .stock-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
    }
    .stock-item-info { font-size: 0.9rem; }
    .stock-item-code { font-weight: 700; margin-right: 8px; }
    .stock-item-name { color: var(--muted); font-size: 0.82rem; }
    .btn-edit {
      display: block;
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 4px;
    }
    .btn-edit:hover { background: #2563eb; }

    .info-box {
      background: rgba(59,130,246,.08);
      border: 1px solid rgba(59,130,246,.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .info-box strong { color: var(--blue); }

    /* ── Spinner ── */
    .spinner {
      display: flex; justify-content: center; align-items: center; height: 200px;
    }
    .spinner::after {
      content: '';
      width: 34px; height: 34px;
      border: 4px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.74rem;
      padding: 20px 0 24px;
    }
    footer a { color: var(--blue); text-decoration: none; }

    /* ── Guide tab ── */
    .guide-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .guide-section h2 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .guide-desc {
      font-size: 0.83rem;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .guide-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-bottom: 10px;
    }
    .guide-table th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      padding: 7px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .guide-table td {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.45;
    }
    .guide-table tr:last-child td { border-bottom: none; }
    .guide-table tr:nth-child(even) td { background: var(--surface2); }
    .guide-formula {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.83rem;
      margin-top: 6px;
    }
    .formula-label {
      font-weight: 700;
      color: var(--muted);
      min-width: 80px;
    }
    .formula-val { color: var(--blue); }

    @media (max-width: 440px) {
      .card-value { font-size: 1.2rem; }
      .grid { gap: 9px; }
      .tab { padding: 7px 10px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📊 盤後籌碼報告</h1>
    <span class="updated" id="updated">載入中…</span>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<div id="pages"></div>

<footer>
  資料來源：FinMind API &nbsp;|&nbsp;
  <a href="https://github.com/dksbluesky/dk-stock-watch-gemini" target="_blank">GitHub</a>
</footer>

<script>
const REPO = 'dksbluesky/dk-stock-watch-gemini';
const FILE = 'data/report.json';

/* ── helpers ── */
const s  = v => v > 0 ? '+' : '';
const cc = v => v > 0 ? 'up' : v < 0 ? 'down' : 'neutral';
const ar = v => v > 0 ? '▲' : v < 0 ? '▼' : '―';
const fmt = (v, d=2) => Math.abs(v).toLocaleString('zh-TW', {minimumFractionDigits:d, maximumFractionDigits:d});

async function fetchData() {
  const res = await fetch(
    `https://api.github.com/repos/${REPO}/contents/${FILE}`,
    { headers: { Accept: 'application/vnd.github.v3+json' }, cache: 'no-store' }
  );
  if (!res.ok) throw new Error(`GitHub API ${res.status}`);
  const meta = await res.json();
  const binary = atob(meta.content.replace(/\n/g, ''));
  const bytes  = Uint8Array.from(binary, c => c.charCodeAt(0));
  return JSON.parse(new TextDecoder('utf-8').decode(bytes));
}

/* ── Tab system ── */
let activeTab = 0;
function switchTab(i) {
  activeTab = i;
  document.querySelectorAll('.tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  document.querySelectorAll('.page').forEach((p, idx) => p.classList.toggle('active', idx === i));
}

/* ── Market page ── */
function renderMarket(m) {
  const futColor = m.futures_net < 0 ? 'down' : 'up';
  const fdColor  = m.futures_diff < 0 ? 'down' : 'up';
  const fdLabel  = m.futures_diff < 0 ? '空增' : '空減';
  return `
    <div class="grid">
      <div class="card full">
        <div class="card-label">外資大台期貨 淨口數</div>
        <div class="card-value ${futColor}">${m.futures_net.toLocaleString()} 口</div>
        <div class="card-diff">
          <span class="${fdColor}">${fdLabel} ${Math.abs(m.futures_diff).toLocaleString()} 口</span>
        </div>
      </div>
      <div class="card full">
        <div class="card-label">大盤融資餘額</div>
        <div class="card-value">${fmt(m.margin_total_yi)} 億</div>
        <div class="card-diff">
          <span class="${cc(m.margin_total_diff_yi)}">${ar(m.margin_total_diff_yi)} ${s(m.margin_total_diff_yi)}${fmt(m.margin_total_diff_yi)} 億</span>
          &nbsp;散戶${m.margin_total_sentiment}
        </div>
      </div>
    </div>`;
}

/* ── Stock page ── */
function renderStock(s_) {
  if (!s_.ok) return `
    <div class="grid">
      <div class="err-card">⚠️ 資料取得失敗<br><small>${s_.error}</small></div>
    </div>`;

  const pBadge = s_.price_change > 0
    ? `<span class="badge bg-green">▲ +${Math.abs(s_.price_change).toFixed(2)}</span>`
    : s_.price_change < 0
    ? `<span class="badge bg-red">▼ ${Math.abs(s_.price_change).toFixed(2)}</span>`
    : `<span class="badge bg-blue">持平</span>`;

  const barPct = Math.min(s_.vol_ratio / 3 * 100, 100).toFixed(1);
  const volBadge = s_.vol_abnormal
    ? `<span class="badge bg-red">⚠️ 異常放量</span>`
    : `<span class="badge bg-blue">量能平穩</span>`;

  return `
    <div class="grid">
      <div class="card">
        <div class="card-label">收盤價</div>
        <div class="card-value">${s_.price_close.toFixed(2)}</div>
        <div class="card-diff">${pBadge}</div>
      </div>
      <div class="card">
        <div class="card-label">券資比</div>
        <div class="card-value ${cc(s_.chip_ratio_diff_pct)}">${s_.chip_ratio_pct.toFixed(2)}%</div>
        <div class="card-diff">
          <span class="${cc(s_.chip_ratio_diff_pct)}">
            ${s_.chip_ratio_diff_pct > 0 ? '↑' : '↓'} ${Math.abs(s_.chip_ratio_diff_pct).toFixed(2)}%
          </span>
        </div>
      </div>
      <div class="card">
        <div class="card-label">融資餘額</div>
        <div class="card-value">${s_.margin.toLocaleString()} 張</div>
        <div class="card-diff">
          <span class="${cc(s_.margin_diff)}">${ar(s_.margin_diff)} ${Math.abs(s_.margin_diff).toLocaleString()} 張</span>
        </div>
      </div>
      <div class="card">
        <div class="card-label">借券餘額</div>
        <div class="card-value">${s_.short_sale.toLocaleString()} 張</div>
        <div class="card-diff">
          <span class="${cc(s_.short_sale_diff)}">${ar(s_.short_sale_diff)} ${Math.abs(s_.short_sale_diff).toLocaleString()} 張</span>
        </div>
      </div>
      <div class="card full">
        <div class="card-label">籌碼情境判定${s_.chip_situation_date ? ` <span class="as-of">（以 ${s_.chip_situation_date} 券資比/股價變動為準）</span>` : ''}</div>
        <div class="box">${s_.chip_situation}</div>
      </div>
      <div class="card full">
        <div class="card-label">20MA 量能倍數</div>
        <div class="card-value">${s_.vol_ratio.toFixed(2)} 倍</div>
        ${volBadge}
        <div class="vol-bar-wrap">
          <div class="${s_.vol_abnormal ? 'vol-bar hot' : 'vol-bar'}" style="width:${barPct}%"></div>
        </div>
      </div>
      <div class="card full">
        <div class="card-label">🔍 籌碼面專業解析</div>
        <div class="box">
          <p>${s_.vol_analysis}</p>
        </div>
      </div>
    </div>`;
}

/* ── Guide page ── */
function renderGuide() {
  return `
    <div class="guide-section">
      <h2>📌 籌碼情境判定</h2>
      <p class="guide-desc">比較今日 vs 昨日的「券資比變動」和「股價漲跌」，得出四種情境：</p>
      <table class="guide-table">
        <thead><tr><th>券資比</th><th>股價</th><th>情境</th><th>意涵</th></tr></thead>
        <tbody>
          <tr><td>↑ 上升</td><td>↑ 上漲</td><td>🔥 軋空啟動</td><td>空方被迫買回，助漲多頭氣勢</td></tr>
          <tr><td>↓ 下降</td><td>↓ 下跌</td><td>⚠️ 殺多盤</td><td>多方認賠殺出，融資斷頭壓力大</td></tr>
          <tr><td>↑ 上升</td><td>↓ 下跌</td><td>🐻 空頭壓制</td><td>看空者眾且正確，股價積弱不振</td></tr>
          <tr><td>↓ 下降</td><td>↑ 上漲/持平</td><td>🏳️ 軋空結束</td><td>空方已補回，後續推升力道減弱</td></tr>
        </tbody>
      </table>
      <div class="guide-formula">
        <span class="formula-label">券資比</span>
        <span class="formula-val">借券餘額 ÷ 融資餘額 × 100%</span>
      </div>
      <div class="guide-formula">
        <span class="formula-label">券資比變動</span>
        <span class="formula-val">今日券資比 − 昨日券資比</span>
      </div>
    </div>

    <div class="guide-section">
      <h2>📌 20MA 量能倍數</h2>
      <p class="guide-desc">今日成交量 ÷ 近 20 日平均成交量，衡量量能是否異常：</p>
      <table class="guide-table">
        <thead><tr><th>數值範圍</th><th>判定</th><th>說明</th></tr></thead>
        <tbody>
          <tr><td>&lt; 1.5 倍</td><td>🛡️ 量能平穩</td><td>無明顯異常，市場觀望</td></tr>
          <tr><td>≥ 1.5 倍</td><td>⚠️ 異常放量</td><td>需進一步看漲跌方向判斷籌碼意涵</td></tr>
        </tbody>
      </table>
    </div>

    <div class="guide-section">
      <h2>📌 籌碼面專業解析</h2>
      <p class="guide-desc">結合量能倍數與股價方向，給出三種文字解析：</p>
      <table class="guide-table">
        <thead><tr><th>成交量</th><th>股價</th><th>解析</th></tr></thead>
        <tbody>
          <tr><td>≥ 1.5 倍</td><td>↑ 上漲</td><td>🚀 異常放量上漲，券資比同步升高則具軋空潛力</td></tr>
          <tr><td>≥ 1.5 倍</td><td>↓ 下跌</td><td>⚠️ 異常放量下跌，注意籌碼鬆動風險</td></tr>
          <tr><td>&lt; 1.5 倍</td><td>任意</td><td>🛡️ 量能平穩，盤勢處於區間震盪</td></tr>
        </tbody>
      </table>
    </div>`;
}

/* ── Manage page ── */
function renderManage(stocks) {
  const listHTML = stocks.map(s => `
    <div class="stock-item">
      <div class="stock-item-info">
        <span class="stock-item-code">${s.code}</span>
        <span class="stock-item-name">${s.name}</span>
      </div>
      <span class="badge ${s.ok ? 'bg-green' : 'bg-red'}">${s.ok ? '正常' : '異常'}</span>
    </div>`).join('');

  return `
    <div class="manage-section">
      <h2>目前監控清單</h2>
      <div class="stock-list">
        ${listHTML || '<div style="color:var(--muted);font-size:.85rem">尚無股票</div>'}
      </div>
    </div>
    <div class="manage-section">
      <h2>新增 / 移除股票</h2>
      <div class="info-box" style="margin-bottom:12px">
        直接編輯 GitHub 上的 <strong>watchlist.json</strong>，即可新增或移除監控股票。<br>
        格式範例：<br>
        <code style="color:var(--text);font-size:.82rem">
          [<br>
          &nbsp;&nbsp;{"code": "006208", "name": "富邦台50"},<br>
          &nbsp;&nbsp;{"code": "2330", "name": "台積電"}<br>
          ]
        </code>
      </div>
      <a class="btn-edit"
         href="https://github.com/dksbluesky/dk-stock-watch-gemini/edit/main/watchlist.json"
         target="_blank">
        ✏️ 在 GitHub 上編輯 watchlist.json
      </a>
    </div>`;
}

/* ── Bootstrap ── */
function renderError(msg) {
  document.getElementById('updated').textContent = '載入失敗';
  document.getElementById('tabs').innerHTML = '<div class="tab active">錯誤</div>';
  document.getElementById('pages').innerHTML = `
    <div class="page active" style="padding:16px;max-width:720px;margin:0 auto">
      <div class="grid"><div class="err-card">❌ 無法載入資料<br>
      <small style="color:var(--muted)">${msg}</small><br>
      <small style="color:var(--muted)">請確認 GitHub Actions 是否已執行，或稍後重新整理。</small>
      </div></div>
    </div>`;
}

fetchData().then(data => {
  document.getElementById('updated').textContent = `更新：${data.generated}`;

  const stocks = data.stocks || [];
  window._stockCount = stocks.length;

  // Build tabs
  const tabsEl  = document.getElementById('tabs');
  const pagesEl = document.getElementById('pages');

  const tabDefs = [
    { label: '🌐 大盤', html: renderMarket(data.market) },
    ...stocks.map(s => ({ label: s.code, html: renderStock(s) })),
    { label: '📖 說明', html: renderGuide() },
    { label: '⚙️ 管理', html: renderManage(stocks) },
  ];

  tabDefs.forEach((t, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.textContent = t.label;
    tab.onclick = () => switchTab(i);
    tabsEl.appendChild(tab);

    const page = document.createElement('div');
    page.className = 'page' + (i === 0 ? ' active' : '');
    page.innerHTML = t.html;
    pagesEl.appendChild(page);
  });

}).catch(e => renderError(e.message));
</script>
</body>
</html>
